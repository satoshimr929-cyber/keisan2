:root{
  --bg0:#06091a; --bg1:#0e1428;
  --panel:#08091e; --line:#d0d8ff;
  --ink:#eef2ff; --ink-soft:#9aaacf;
  --gold:#ffd040; --gold-d:#a86800;
  --hp:#3ec860; --hp-d:#1a7034;
  --mp:#40aaff; --exp:#ffd040;
  --red:#ff3a3a; --blue:#4a90ff;
  --radius:4px;
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important;}
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
body{
  font-family:'DotGothic16','Hiragino Maru Gothic ProN','ヒラギノ丸ゴ ProN W4','BIZ UDPGothic',sans-serif;
  color:var(--ink);-webkit-font-smoothing:none;font-smooth:never;
  background:
    radial-gradient(2px 2px at 15% 25%,rgba(255,255,255,.55),transparent),
    radial-gradient(2px 2px at 70% 15%,rgba(255,255,255,.45),transparent),
    radial-gradient(1.5px 1.5px at 40% 65%,rgba(255,255,255,.35),transparent),
    radial-gradient(1.5px 1.5px at 88% 72%,rgba(255,255,255,.28),transparent),
    radial-gradient(1px 1px at 55% 40%,rgba(180,200,255,.3),transparent),
    linear-gradient(180deg,var(--bg0),var(--bg1));
  background-attachment:fixed;
}
/* CRTスキャンライン（subtleなSFC風） */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
  pointer-events:none;z-index:9998;
}
#app{max-width:500px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:14px 14px 32px;}
.screen{display:none;flex:1;flex-direction:column;}
.screen.active{display:flex;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* ウィンドウ枠（DQ風2重ボーダー） */
.win{
  background:var(--panel);
  border:3px solid var(--line);
  border-radius:var(--radius);
  padding:12px 14px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.12),
    inset 2px 2px 0 rgba(255,255,255,.1),
    inset -2px -2px 0 rgba(0,0,0,.6),
    0 4px 16px rgba(0,0,0,.5);
}

/* ===== トップバー ===== */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.icon-btn{width:44px;height:44px;border-radius:8px;background:var(--panel);border:2px solid var(--line);
  font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.icon-btn:active{transform:translateY(2px);}
.topbar h2{font-size:18px;margin:0;font-weight:800;flex:1;}

/* ===== タイトル ===== */
#screen-title{justify-content:flex-start;}
.title-art{position:relative;width:calc(100% + 28px);margin:-14px -14px 0;overflow:hidden;border-radius:0 0 6px 6px;}
.title-bg{display:block;width:100%;height:auto;}
.title-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(11,16,32,.85));
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 10px 16px;}
.title-party{display:flex;justify-content:center;gap:10px;margin-bottom:8px;}
.hero-sprite{height:72px;width:auto;image-rendering:pixelated;image-rendering:-moz-crisp-edges;}
.app-title{font-size:34px;font-weight:800;color:var(--gold);
  text-shadow:0 2px 0 var(--gold-d),0 4px 12px rgba(0,0,0,.6);margin:0 0 2px;}
.app-sub{font-size:13px;color:#ffe9a8;margin:0 0 10px;text-shadow:0 1px 4px rgba(0,0,0,.7);}
.title-pct{font-size:12px;color:var(--ink-soft);margin:4px 0 0;}
.title-btns{display:flex;flex-direction:column;gap:10px;padding:18px 4px 0;}
.title-btn{width:100%;height:60px;border-radius:var(--radius);font-size:20px;font-weight:800;letter-spacing:.06em;
  background:linear-gradient(180deg,#ffe090,var(--gold));border:3px solid var(--gold-d);
  color:#1a1000;box-shadow:0 4px 0 var(--gold-d),inset 0 1px 0 rgba(255,255,255,.4);transition:transform .08s;}
.title-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-d);}
.title-btn.secondary{background:linear-gradient(180deg,#2a3670,#1a2550);border-color:#5aa0ff;
  color:var(--blue);box-shadow:0 4px 0 #0e1a40;}
.title-btn.secondary:active{box-shadow:0 1px 0 #0e1a40;}
.mute-area{display:flex;justify-content:flex-end;padding-top:10px;}
#muteBtn{padding:8px 14px;border-radius:8px;background:var(--panel);border:2px solid #39406a;
  font-size:16px;color:var(--ink-soft);}

/* ===== ヒーローウィンドウ ===== */
.hero-win{margin-bottom:12px;}
.hero-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.hero-name{font-weight:800;font-size:15px;}
.hero-lv{font-weight:800;color:var(--gold);font-size:15px;}
.equip-line{font-size:11px;color:var(--ink-soft);margin-top:4px;}
.equip-line b{color:var(--gold);}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-tag{width:30px;font-size:12px;font-weight:800;color:var(--ink-soft);}
.bar{flex:1;height:13px;background:#1e2546;border-radius:7px;overflow:hidden;border:1px solid #2c3461;}
.bar>i{display:block;height:100%;width:0;transition:width .45s ease;border-radius:7px;}
.bar.hp>i{background:linear-gradient(180deg,#6ff09a,var(--hp));}
.bar.exp>i{background:linear-gradient(180deg,#ffe27a,var(--exp));}
.bar-num{font-size:11px;font-weight:800;color:var(--ink-soft);min-width:54px;text-align:right;}

/* ===== ストーリー画面 ===== */
#screen-story{justify-content:center;align-items:center;gap:14px;text-align:center;padding:24px 14px;}
.story-ico{font-size:56px;margin-bottom:-4px;animation:bounce 1.2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.story-title{font-size:22px;font-weight:800;color:var(--gold);margin:0;}
.story-grade{font-size:12px;color:var(--ink-soft);font-weight:700;margin:2px 0 10px;}
.story-text{font-size:16px;font-weight:700;line-height:1.8;color:var(--ink);}
.story-btns{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:8px;}

/* ===== ワールドマップ ===== */
#screen-map{}
#mapContainer{
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  margin-bottom:12px;
  border:3px solid var(--line);
  border-radius:var(--radius);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),0 4px 20px rgba(0,0,0,.6);
}
#mapContainer::-webkit-scrollbar{height:6px;}
#mapContainer::-webkit-scrollbar-track{background:var(--panel);}
#mapContainer::-webkit-scrollbar-thumb{background:#3a4870;border-radius:3px;}
.worldmap-svg{width:auto;min-width:640px;height:auto;display:block;}
.map-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-bottom:12px;justify-content:center;}
.map-legend span{display:flex;align-items:center;gap:4px;}

/* ===== バトル ===== */
.enemy-area{
  position:relative;flex:none;
  background:linear-gradient(180deg,#060c20,#04081a);
  border:3px solid var(--line);
  border-radius:var(--radius);
  padding:10px 12px 16px;
  margin-bottom:12px;
  overflow:hidden;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.1),
    inset 2px 2px 0 rgba(255,255,255,.08),
    inset -2px -2px 0 rgba(0,0,0,.7),
    0 4px 20px rgba(0,0,0,.6);
}
.enemy-dots{display:flex;gap:6px;justify-content:center;margin-bottom:6px;}
.edot{width:14px;height:14px;border-radius:50%;background:#2c3461;border:1px solid #44508a;
  box-shadow:0 1px 3px rgba(0,0,0,.7);}
.edot.dead{background:#333;opacity:.4;}
.edot.boss{border-radius:3px;background:#5a2d6e;border-color:#9a5cc0;}
.edot.boss.dead{background:#444;}
.enemy-name{text-align:center;font-weight:800;font-size:16px;margin-bottom:6px;
  text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,0,0,.8);}
.boss-tag{color:var(--gold);font-size:12px;margin-right:4px;}
.enemy-hp{display:flex;align-items:center;gap:8px;max-width:240px;margin:0 auto 8px;}
.enemy-hp .bar{height:11px;}
.enemy-hp .bar>i{background:linear-gradient(180deg,#ff8a8a,var(--red));}
.enemy-stage{height:150px;display:flex;align-items:flex-end;justify-content:center;position:relative;}
.enemy-sprite{height:130px;width:auto;max-width:92%;display:block;
  position:relative;z-index:1;
  image-rendering:pixelated;image-rendering:-moz-crisp-edges;
  animation:bob 2.4s ease-in-out infinite;transform-origin:center bottom;}
.enemy-sprite.boss{height:150px;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}
.enemy-sprite.hit{animation:ehit .4s;}
@keyframes ehit{0%,100%{filter:none;transform:translateX(0);}
  20%{filter:brightness(3) saturate(0);transform:translateX(-8px);}
  40%{transform:translateX(8px);}60%{filter:brightness(3) saturate(0);transform:translateX(-5px);}
  80%{transform:translateX(5px);}}
.enemy-sprite.defeated{animation:edie .55s forwards;}
@keyframes edie{to{opacity:0;transform:translateY(12px) scale(.5) rotate(14deg);}}
.float-dmg{position:absolute;font-size:32px;font-weight:800;
  color:#fff;text-shadow:0 2px 0 #000,0 0 10px rgba(0,0,0,.7);
  left:50%;top:20px;transform:translateX(-50%);pointer-events:none;
  z-index:2;
  animation:floatup 1s ease forwards;}
.float-dmg.crit{color:var(--gold);font-size:42px;}
@keyframes floatup{0%{opacity:1;transform:translateX(-50%) translateY(0);}
  100%{opacity:0;transform:translateX(-50%) translateY(-60px);}}

/* パーティ */
.party{display:flex;justify-content:center;align-items:flex-end;gap:16px;}
.battle-party{margin-bottom:12px;}
.battle-party .hero-sprite{height:66px;}
.hero-sprite.hurt{animation:hshake .45s;}
@keyframes hshake{0%,100%{transform:translateX(0);filter:none;}
  20%{transform:translateX(-6px);filter:brightness(2.4) saturate(.3);}
  40%{transform:translateX(6px);}60%{transform:translateX(-4px);filter:brightness(2.4) saturate(.3);}
  80%{transform:translateX(4px);}}

/* メッセージウィンドウ */
.msg-win{min-height:96px;margin-bottom:12px;}
.msg-win p{margin:0 0 6px;font-size:16px;font-weight:700;line-height:1.35;}
.msg-win p:last-child{margin-bottom:0;}
.msg-win p.lvup{color:var(--gold);}
.msg-win p.good{color:var(--hp);}
.msg-win p.bad{color:var(--red);}
.msg-win .hint{color:var(--ink-soft);font-weight:700;}
.msg-win .hint-msg{color:#7fd0ff;font-size:14px;font-weight:700;line-height:1.55;}
.msg-win .mn-exp{color:var(--ink-soft);font-size:13px;font-weight:700;line-height:1.6;
  margin-top:4px;padding-top:4px;border-top:1px dashed #39406a;}

/* 問題ウィンドウ */
.spell-win{margin-bottom:12px;text-align:center;}
.spell-label{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.08em;margin-bottom:8px;}
.q-instr{font-size:14px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;}
.q-text{font-size:34px;font-weight:800;line-height:1.3;letter-spacing:.04em;}
.frac{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 4px;}
.frac .num,.frac .den{padding:0 8px;line-height:1.1;}
.frac .bar{width:100%;height:3px;background:var(--ink);border-radius:2px;margin:3px 0;}

/* こたえ */
.answer-area{display:flex;justify-content:center;margin-top:14px;}
.ans-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.ans-field-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ans-label{font-size:12px;font-weight:800;color:var(--ink-soft);}
.ans-box{min-width:74px;height:60px;padding:0 12px;border-radius:var(--radius);
  background:#0a0e22;border:3px solid #4050a0;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:var(--ink);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.06);}
.ans-box.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,207,63,.22);}
.ans-box .ph{color:#5b6390;font-size:22px;}
.amari-txt{font-size:16px;font-weight:800;color:var(--ink-soft);align-self:flex-end;margin-bottom:12px;}
.frac-input{display:flex;flex-direction:column;align-items:center;gap:4px;}
.frac-input .barwide{width:92px;height:3px;background:var(--ink);border-radius:2px;}

/* キーパッド（SFC風） */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:6px;}
.key{height:58px;border-radius:var(--radius);
  background:linear-gradient(180deg,#1c2550,#101838);
  border:2px solid #5060a0;
  font-size:26px;font-weight:800;color:var(--ink);
  box-shadow:0 3px 0 #080c20,inset 0 1px 0 rgba(255,255,255,.1);}
.key:active{transform:translateY(2px);background:#101838;box-shadow:0 1px 0 #080c20;}
.key.del{font-size:18px;color:var(--red);}
.key.hidden{visibility:hidden;}

/* ボタン類（SFC風） */
.cmd-btn{width:100%;height:58px;border-radius:var(--radius);font-size:21px;font-weight:800;letter-spacing:.06em;color:#1a1000;
  background:linear-gradient(180deg,#ffe090,var(--gold));border:3px solid var(--gold-d);
  box-shadow:0 4px 0 var(--gold-d),inset 0 1px 0 rgba(255,255,255,.4);margin-top:14px;transition:transform .08s;}
.cmd-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-d);}
.cmd-btn:disabled{background:#1a2040;color:#5060a0;border-color:#2a3050;
  box-shadow:0 4px 0 #111830;cursor:default;}
.cmd-btn:disabled:active{transform:none;box-shadow:0 4px 0 #2a3158;}
.cmd-btn.cont{background:linear-gradient(180deg,#7fd0ff,#46b6ff);color:#06223a;
  border-color:#2a7fb8;box-shadow:0 4px 0 #2a7fb8;}
.cmd-btn.cont:active{box-shadow:0 1px 0 #2a7fb8;}
.cmd-btn.red{background:linear-gradient(180deg,#ff8a8a,var(--red));color:#fff;
  border-color:#c04040;box-shadow:0 4px 0 #c04040;}
.cmd-btn.red:active{box-shadow:0 1px 0 #c04040;}
.cmd-btn.secondary{background:linear-gradient(180deg,#233070,#152044);border-color:#5aa0ff;
  color:var(--blue);box-shadow:0 4px 0 #0e1a40;}
.cmd-btn.secondary:active{transform:translateY(3px);box-shadow:0 1px 0 #0e1a40;}

/* ヒントボタン */
.hint-btn-area{display:flex;justify-content:flex-end;margin-top:6px;}
#hintBtn{height:38px;padding:0 16px;border-radius:8px;background:var(--panel);
  border:2px solid #46b6ff;color:#46b6ff;font-size:15px;font-weight:800;
  display:inline-flex;align-items:center;gap:4px;}
#hintBtn:active{transform:translateY(2px);}
#hintBtn.used{border-color:#39406a;color:#5b6390;}

.flash-red{animation:flashred .42s;}
@keyframes flashred{0%,100%{box-shadow:none;}35%{box-shadow:0 0 0 4px var(--red),0 0 28px var(--red);}}

/* ===== けっか ===== */
.center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;}
.big-emblem{width:120px;height:120px;}
.big-title{font-size:30px;font-weight:800;margin:0;}
.big-title.clear{color:var(--gold);text-shadow:0 2px 0 var(--gold-d);}
.big-title.over{color:var(--red);}
.result-stats{width:100%;}
.result-stats .row{display:flex;justify-content:space-between;font-size:16px;font-weight:700;
  padding:7px 2px;border-bottom:1px dashed #39406a;}
.result-stats .row:last-child{border-bottom:none;}
.result-stats .row .v{font-weight:800;color:var(--gold);}
.btn-col{display:flex;flex-direction:column;gap:10px;width:100%;margin-top:16px;}

/* 報酬 */
.reward-box{width:100%;background:var(--panel);border:3px solid var(--gold);
  border-radius:12px;padding:14px;display:none;margin-top:14px;}
.reward-chest{font-size:34px;position:relative;height:56px;margin-bottom:4px;
  display:flex;align-items:center;justify-content:center;}
.chest-img{width:52px;height:52px;}
.reward-pop{position:absolute;left:50%;top:-8px;transform:translateX(-50%);
  font-size:32px;animation:rewardPop .65s ease-out both;}
@keyframes rewardPop{0%{transform:translateX(-50%) scale(0) translateY(10px);opacity:0;}
  60%{transform:translateX(-50%) scale(1.3) translateY(-16px);opacity:1;}
  100%{transform:translateX(-50%) scale(1) translateY(-20px);opacity:1;}}
.reward-line{font-size:15px;font-weight:700;margin-top:6px;line-height:1.5;}
.reward-line b{color:var(--gold);}
.reward-atk{color:#ff7ab0;font-weight:800;}
.reward-line.big{font-size:17px;color:var(--gold);margin-top:10px;}

/* まちがいノート */
.mistake-note{width:100%;margin-top:14px;}
.mn-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-right:4px;}
.mn-item{background:var(--panel);border:3px solid var(--line);border-radius:8px;padding:10px 12px;}
.mn-q{font-size:16px;font-weight:800;margin-bottom:6px;}
.mn-row{font-size:14px;font-weight:700;line-height:1.5;}
.mn-your{color:var(--red);}
.mn-ans{color:var(--gold);}
.mn-exp{margin-top:6px;padding-top:6px;border-top:1px dashed #39406a;
  font-size:14px;font-weight:700;line-height:1.7;color:var(--ink-soft);}
.mn-exp b{color:var(--ink);}

/* アイコン画像 */
.w-ico{height:1.3em;vertical-align:-.36em;}
.k-ico{height:1.4em;vertical-align:-.42em;}
.bag-title .w-ico,.equip-line .w-ico{height:1.4em;vertical-align:-.4em;}
.bag-item img,.chest-img,.reward-pop img{display:block;}
.reward-pop img{width:40px;height:40px;}

/* そうびバッグ */
.bag-win{margin-bottom:12px;}
.bag-title{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
.bag-title b{color:var(--gold);}
.bag-row{display:flex;flex-wrap:wrap;gap:6px;}
.bag-item{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:18px;border-radius:7px;background:#11182f;border:2px solid #39406a;}
.bag-item.eq{border-color:var(--gold);box-shadow:0 0 0 2px rgba(255,207,63,.28);}
.bag-item img{width:28px;height:28px;}

/* ===== アチーブメント ===== */
.ach-list{display:flex;flex-direction:column;gap:10px;padding:4px 0;}
.ach-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:8px;background:var(--panel);border:2px solid #39406a;opacity:.5;}
.ach-item.earned{border-color:var(--gold);opacity:1;}
.ach-ico{font-size:28px;flex:none;}
.ach-info{flex:1;}
.ach-info b{font-size:15px;font-weight:800;}
.ach-info small{font-size:12px;color:var(--ink-soft);display:block;margin-top:2px;}

/* アチーブメントポップアップ */
.achievement-popup{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);
  background:linear-gradient(135deg,#1a2547,#0a0e1c);border:2px solid var(--gold);
  border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:12px;
  font-size:14px;font-weight:800;z-index:9999;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .35s ease;
  opacity:0;box-shadow:0 4px 24px rgba(0,0,0,.5);white-space:nowrap;
}
.achievement-popup.show{transform:translateX(-50%) translateY(0);opacity:1;}
.achievement-popup .ach-icon{font-size:24px;}
.achievement-popup .ach-info b{font-size:13px;}
.achievement-popup .ach-info{color:var(--gold);}

/* ===== 習熟度 ===== */
.mastery-list{display:flex;flex-direction:column;gap:8px;padding:4px 0;}
.mastery-item{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;}
.mastery-item span:first-child{min-width:110px;color:var(--ink-soft);}
.mastery-bar-wrap{flex:1;display:flex;align-items:center;gap:8px;position:relative;
  height:16px;background:#1e2546;border-radius:8px;overflow:hidden;}
.mastery-bar{height:100%;border-radius:8px;transition:width .5s ease;}
.mastery-pct{position:absolute;right:6px;font-size:11px;font-weight:800;color:var(--ink);}
.mastery-pct.gray{color:var(--ink-soft);}

/* ===== 共通ユーティリティ ===== */
.grade-sep{font-size:13px;font-weight:800;color:var(--gold);margin:8px 2px 0;letter-spacing:1px;}
.scroll-y{overflow-y:auto;flex:1;}

/* ふりがな */
ruby rt{font-size:.55em;color:var(--ink-soft);}

/* スマホ対応 */
@media (max-height:700px){
  .enemy-stage{height:120px;}
  .enemy-sprite{height:110px;}
  .q-text{font-size:28px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- ===== タイトル ===== -->
  <section class="screen active" id="screen-title">
    <div class="title-art">
      <img class="title-bg" id="titleBg" src="" alt="けいさんクエスト">
      <div class="title-overlay">
        <p class="app-sub">算数RPG　小学4〜6年生</p>
        <p class="title-pct" id="titlePct"></p>
      </div>
    </div>
    <div class="title-btns">
      <button class="title-btn" data-screen="screen-map">⚔️ ぼうけんに でる</button>
      <button class="title-btn secondary" id="practiceBtn">📖 ふくしゅうモード</button>
      <button class="title-btn secondary" data-screen="screen-achievements">🏆 しょうごう・せいかい</button>
      <button class="title-btn secondary" data-screen="screen-mastery">📊 習熟度チェック</button>
    </div>
    <div class="mute-area">
      <button id="muteBtn" aria-label="ミュートにする" title="音のオン/オフ">🔊</button>
    </div>
  </section>

  <!-- ===== ストーリー ===== -->
  <section class="screen" id="screen-story">
    <div class="topbar">
      <button class="icon-btn" id="storyBackBtn" aria-label="もどる">←</button>
      <h2 id="storyTitle">ステージ</h2>
      <span id="storyGrade" style="font-size:12px;color:var(--ink-soft);font-weight:700;"></span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;">
      <div class="story-ico" id="storyIco">🌱</div>
      <p class="story-text" id="storyText"></p>
    </div>
    <div class="story-btns">
      <button class="cmd-btn" id="storyStartBtn">⚔️ たたかいかいし！</button>
    </div>
  </section>

  <!-- ===== ワールドマップ ===== -->
  <section class="screen" id="screen-map">
    <div class="topbar">
      <button class="icon-btn" data-back="screen-title" aria-label="タイトルへ">←</button>
      <h2>🗺️ ワールドマップ</h2>
    </div>
    <div class="win hero-win" id="heroWinMap"></div>
    <div class="win bag-win" id="bagWin"></div>
    <div id="mapContainer"></div>
    <div class="map-legend">
      <span>⭐ クリア済み</span>
      <span>🔒 ロック中</span>
      <span style="color:var(--gold);">● 挑戦可能（ひかっているノード）</span>
    </div>
  </section>

  <!-- ===== バトル ===== -->
  <section class="screen" id="screen-battle">
    <div class="topbar">
      <button class="icon-btn" data-back="screen-map" aria-label="マップへもどる">←</button>
      <h2 id="battleTitle">バトル</h2>
    </div>
    <div class="win hero-win" id="heroWinBattle"></div>
    <div class="enemy-area">
      <div class="enemy-dots" id="enemyDots"></div>
      <div class="enemy-name" id="enemyName"></div>
      <div class="enemy-hp">
        <span class="bar-tag" style="width:auto;">HP</span>
        <div class="bar"><i id="enemyHpBar"></i></div>
      </div>
      <div class="enemy-stage" id="enemyStage"></div>
    </div>
    <div class="win msg-win" id="msgWin"></div>
    <div class="party battle-party" id="battleParty"></div>
    <div class="win spell-win">
      <div class="spell-label">📜 <ruby>じゅもん<rt>問題</rt></ruby></div>
      <div class="q-instr" id="qInstr" style="display:none"></div>
      <div class="q-text" id="qText"></div>
      <div class="answer-area" id="answerArea"></div>
    </div>
    <div id="inputCluster">
      <div class="keypad" id="keypad"></div>
      <div class="hint-btn-area">
        <button id="hintBtn" aria-label="ヒントをみる">💡 ヒント</button>
      </div>
      <button class="cmd-btn" id="attackBtn" disabled>⚔️ こうげき！</button>
    </div>
    <button class="cmd-btn cont" id="continueBtn" style="display:none">つづける</button>
  </section>

  <!-- ===== クリア ===== -->
  <section class="screen" id="screen-clear">
    <div class="center-wrap">
      <div id="crownEmblem"></div>
      <h2 class="big-title clear">🎉 ステージクリア！</h2>
      <div class="win result-stats" id="clearStats"></div>
      <div class="reward-box" id="rewardBox"></div>
      <div class="mistake-note win" id="clearNote" style="display:none"></div>
      <div class="btn-col">
        <button class="cmd-btn" id="clearRetry">🔄 もう一度 あそぶ</button>
        <button class="cmd-btn cont" id="clearOther">🗺️ ほかのステージへ</button>
        <button class="cmd-btn secondary" data-back="screen-title">🏠 タイトルへ</button>
      </div>
    </div>
  </section>

  <!-- ===== ゲームオーバー ===== -->
  <section class="screen" id="screen-over">
    <div class="center-wrap">
      <div id="skullEmblem"></div>
      <h2 class="big-title over">💀 ゆうしゃたおれる…</h2>
      <p style="color:var(--ink-soft);font-size:15px;font-weight:700;">でも まだ おわりじゃない！<br>もう一度 挑戦しよう！</p>
      <div class="win result-stats" id="overStats"></div>
      <div class="mistake-note win" id="overNote" style="display:none"></div>
      <div class="btn-col">
        <button class="cmd-btn" id="overRetry">🔄 もう一度 ちょうせん！</button>
        <button class="cmd-btn cont" id="overFlee">🗺️ マップへもどる</button>
      </div>
    </div>
  </section>

  <!-- ===== アチーブメント ===== -->
  <section class="screen" id="screen-achievements">
    <div class="topbar">
      <button class="icon-btn" data-back="screen-title" aria-label="タイトルへ">←</button>
      <h2>🏆 しょうごう・せいかい</h2>
    </div>
    <div class="scroll-y">
      <div class="ach-list" id="achievementsList"></div>
    </div>
  </section>

  <!-- ===== 習熟度 ===== -->
  <section class="screen" id="screen-mastery">
    <div class="topbar">
      <button class="icon-btn" data-back="screen-title" aria-label="タイトルへ">←</button>
      <h2>📊 習熟度チェック</h2>
    </div>
    <p style="font-size:13px;color:var(--ink-soft);font-weight:700;margin:0 0 10px;">
      各 じゅつの せいかいりつ（3もん以上の データが ひつよう）
    </p>
    <div class="scroll-y">
      <div class="mastery-list" id="masteryList"></div>
    </div>
  </section>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
